{% extends 'base.html' %} {% block content %}

<header class="header">
  <h1>Login</h1>
</header>

<main class="main-container">
  <section class="card">
    <form method="post" class="form-container">
      <label>
        Usuário
        <input
          type="text"
          placeholder="exemplo@email.com"
          name="email"
          required
        />
      </label>

      <label>
        Senha
        <input
          type="password"
          placeholder="Inserir senha"
          name="password"
          required
        />
      </label>

      <div class="radio-group">
        <label>
          <input type="radio" name="user_type" value="mae" />
          Entrar como mãe
        </label>

        <label>
          <input type="radio" name="user_type" value="filho" />
          Entrar como filho(a)
        </label>
      </div>

      <div id="family-code-container" class="family-box">
        <label>
          Código da família
          <input
            type="text"
            name="fam_code"
            id="fam_code"
            placeholder="FAM-1234"
          />
        </label>
      </div>

      <button type="submit" class="button">Entrar</button>
    </form>
  </section>

  <section class="card center-text">
    <p>Não possui cadastro?</p>
    <a href="/signup" class="link">Cadastrar</a>
  </section>

  <script src="{{ url_for('static', filename='js/auth-display.js') }}"></script>
</main>

{% endblock %}
